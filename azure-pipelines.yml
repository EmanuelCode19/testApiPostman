# Starter pipeline
# Start with a minimal pipeline that you can customize to build and deploy your code.
# Add steps that build, run tests, deploy, and more:
# https://aka.ms/yaml

trigger:
- main

pool:
  vmImage: ubuntu-latest
  
steps:
- checkout: self
- task: NodeTool@0
  inputs:
    versionSpec: '18.x'
  displayName: 'Install Node.js'

- script: npm install -g newman
  displayName: 'Install Newman CLI'

- script: npm install -g newman-reporter-htmlextra
  displayName: 'Install Newman HTML EXTRA'

- script: |
    newman run API+deportes.postman_collection.json \
    -r cli,htmlextra,junit \
    --reporter-htmlextra-export ./reports/report.html \
    --reporter-junit-export ./reports/results.xml
  displayName: 'Run API Tests'

- task: PublishTestResults@2
  inputs:
    testResultsFormat: 'JUnit'
    testResultsFiles: 'reports/results.xml'
    testRunTitle: 'Test Api'
